<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The VS Collections</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#fff0f5;
}

header{
  background:#ff4da6;
  color:white;
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
}

.info{
  text-align:center;
  padding:15px;
  background:white;
}

.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:15px;
  background:#ffe6f0;
}

.menu button{
  background:#ff4da6;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.menu button:hover{
  background:#e60073;
  transform:scale(1.05);
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

.btn{
  display:block;
  margin-top:8px;
  background:#25D366;
  color:white;
  padding:8px;
  border-radius:8px;
  text-decoration:none;
}

.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
}
</style>
</head>

<body>

<header>The VS Collections</header>

<div class="info">
  <p style="font-size:20px; font-weight:bold;">🔥 Panties Victoria’s Secret originales</p>
  
  <p style="color:#ff4da6; font-size:18px;">💖 PROMO: 3 por $550</p>
  
  <p style="margin-top:10px;">📦 Entregas en Tijuana:</p>
  
  <p style="font-size:14px;">
    📍 Macroplaza<br>
    📍 Plaza Monarca<br>
    📍 Plaza Paseo 2000<br>
    📍 Zona Río<br>
    📍 El Lago (CETYS Universidad)
  </p>

  <p style="color:red; margin-top:10px;">⏳ Pocas piezas disponibles</p>
</div>

<div class="menu">
  <button onclick="showPanties()">Panties</button>
  <button onclick="showBodies()">Bodies</button>
  <button onclick="showConjuntos()">Conjuntos</button>
</div>

<div class="gallery" id="gallery"></div>

<a class="whatsapp" href="https://wa.me/526643608957" target="_blank">💬</a>

<script>

const whatsapp = "6643608957";

function loadImages(folder, total){
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  for(let i = 1; i <= total; i++){

    const img = folder + "/" + i + ".jpeg";

    const image = new Image();
    image.src = img;

    image.onload = function(){

      const mensaje = encodeURIComponent(
        "Hola, quiero el modelo " + i + " de " + folder + ". ¿Está disponible?"
      );

      gallery.innerHTML += `
        <div class="card">
          <img src="${img}" onclick="window.open('${img}')">
          <a class="btn" href="https://wa.me/52${whatsapp}?text=${mensaje}" target="_blank">
            Comprar por WhatsApp
          </a>
        </div>
      `;
    };
  }
}

function showPanties(){ loadImages("panties", 80); }
function showBodies(){ loadImages("bodies", 20); }
function showConjuntos(){ loadImages("conjuntos", 40); }

showPanties();

</script>

</body>
</html>
