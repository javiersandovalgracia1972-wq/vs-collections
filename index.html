<!DOCTYPE html>
<html>
<head>

<title>The VS Collections</title>

<style>

body{
font-family:Arial;
background:#fff0f5;
text-align:center;
}

h1{
color:#d63384;
}

.section{
margin:40px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.product img{
width:180px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.button{
display:block;
margin-top:5px;
background:#25D366;
color:white;
padding:6px;
border-radius:6px;
text-decoration:none;
}

</style>

</head>

<body>

<h1>The VS Collections</h1>
<p>Venta de productos Victoria Secret en Tijuana</p>

<div class="section">

<h2>Panties / Tangas</h2>
<p>$199 c/u | 3 por $550</p>

<div class="gallery" id="panties"></div>

</div>


<div class="section">

<h2>Conjuntos</h2>
<p>$850</p>

<div class="gallery" id="conjuntos"></div>

</div>


<div class="section">

<h2>Bodies</h2>
<p>Pregunta por disponibilidad</p>

<div class="gallery" id="bodies"></div>

</div>


<div class="section">

<h2>Cremas y Lociones</h2>
<p>$250 c/u | Set 2 piezas $450</p>

</div>


<script>

const whatsapp="https://wa.me/526643608957";

const panties=[
"Messenger_creation_1.jpeg",
"Messenger_creation_2.jpeg"
];

const conjuntos=[
"Messenger_creation_06E0732A-D3B5-4CAB-B85B-7888DB4D5A71.jpeg",
"Messenger_creation_185DF4E7-DCFC-4B17-B730-DF1A01B2DE2D.jpeg",
"Messenger_creation_1F4E2B49-1366-48B7-91DC-7E78EB527C1E.jpeg"
];

const bodies=[
"Messenger_creation_09891DC8-F417-4FD8-948A-8408288675DB.png",
"Messenger_creation_300FF4A7-8AFE-40A1-A944-658E7DA869B8.jpeg"
];


function cargarImagenes(lista,carpeta,id){

const contenedor=document.getElementById(id);

lista.forEach(nombre=>{

const div=document.createElement("div");

div.innerHTML=`
<img src="${carpeta}${nombre}">
<a class="button" href="${whatsapp}">Comprar</a>
`;

contenedor.appendChild(div);

});

}

cargarImagenes(panties,"","panties");
cargarImagenes(conjuntos,"conjuntos/","conjuntos");
cargarImagenes(bodies,"bodies/","bodies");

</script>

</body>
</html>
