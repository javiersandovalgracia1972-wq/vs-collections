<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The VS Collections</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fff0f5;
}

header {
  background: #ff4da6;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 15px;
  background: #ffe6f0;
}

.menu button {
  background: #ff4da6;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 20px;
  cursor: pointer;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

.btn {
  display: block;
  margin-top: 8px;
  background: #25D366;
  color: white;
  padding: 8px;
  border-radius: 8px;
  text-decoration: none;
}

.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
}
</style>
</head>

<body>

<header>The VS Collections</header>

<div class="menu">
  <button onclick="loadImages('panties')">Panties</button>
  <button onclick="loadImages('bodies')">Bodies</button>
  <button onclick="loadImages('conjuntos')">Conjuntos</button>
</div>

<div class="gallery" id="gallery"></div>

<a class="whatsapp-float" href="https://wa.me/5210000000000" target="_blank">💬</a>

<script>
const WHATSAPP = "5210000000000";

// 🔥 AQUI SOLO CAMBIAS EL NÚMERO DE FOTOS
const TOTAL = 150;

function loadImages(folder) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  for (let i = 1; i <= TOTAL; i++) {
    let file = `Messenger_creation_${i}.jpeg`;

    let imgPath = folder + "/" + file;

    let card = `
      <div class="card">
        <img src="${imgPath}" onerror="this.style.display='none'">
        <a class="btn" href="https://wa.me/${WHATSAPP}?text=Hola, me interesa el modelo ${file}" target="_blank">
          Comprar
        </a>
      </div>
    `;

    gallery.innerHTML += card;
  }
}

// Carga inicial
loadImages('panties');
</script>

</body>
</html>
