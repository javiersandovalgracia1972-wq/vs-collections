<!DOCTYPE html>
<html>

<head>

<title>The VS Collections</title>

<style>

body{
font-family:Arial;
background:#fff0f5;
text-align:center;
margin:0;
}

h1{
color:#d63384;
}

.section{
margin:40px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.product{
width:180px;
}

.product img{
width:100%;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 8px rgba(0,0,0,0.2);
}

.button{
display:block;
margin-top:5px;
background:#25D366;
color:white;
padding:6px;
border-radius:6px;
text-decoration:none;
}

#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

#lightbox img{
max-width:90%;
max-height:90%;
}

</style>

</head>

<body>

<h1>The VS Collections</h1>
<p>Venta de productos Victoria Secret en Tijuana</p>

<div class="section">

<h2>Panties / Tangas</h2>
<p>$199 c/u | 3 por $550</p>

<div class="gallery">

<div class="product">
<img src="Messenger_creation_1.jpeg" onclick="openImg(this.src)">
<a class="button" href="https://wa.me/526643608957?text=Hola%20quiero%20estas%20panties">Comprar</a>
</div>

</div>

</div>


<div class="section">

<h2>Conjuntos</h2>
<p>$850</p>

<div class="gallery">

<div class="product">
<img src="conjuntos/Messenger_creation_06E0732A-D3B5-4CAB-B85B-7888DB4D5A71.jpeg" onclick="openImg(this.src)">
<a class="button" href="https://wa.me/526643608957?text=Hola%20quiero%20este%20conjunto">Comprar</a>
</div>

</div>

</div>


<div class="section">

<h2>Bodies</h2>
<p>Pregunta por disponibilidad</p>

<div class="gallery">

<div class="product">
<img src="bodies/Messenger_creation_09891DC8-F417-4FD8-948A-8408288675DB.png" onclick="openImg(this.src)">
<a class="button" href="https://wa.me/526643608957?text=Hola%20quiero%20este%20body">Comprar</a>
</div>

</div>

</div>


<div id="lightbox" onclick="closeImg()">
<img id="bigimg">
</div>

<script>

function openImg(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("bigimg").src=src;
}

function closeImg(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
